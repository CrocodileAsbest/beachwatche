name: Beachplatz Watcher

on:
  schedule:
    - cron: '2-59/5 * * * *'
  workflow_dispatch:  # allow manual runs from the Actions tab

# Prevent two runs from overlapping if a previous one is slow.
concurrency:
  group: beachplatz-watcher
  cancel-in-progress: false

permissions:
  contents: write   # needed for the keepalive job to push

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state
          # New key on every run = always saves; restore-keys finds the latest.
          key: beachplatz-state-${{ github.run_id }}
          restore-keys: |
            beachplatz-state-

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python beachplatz_watcher.py

  # GitHub auto-disables scheduled workflows after 60 days of repo inactivity.
  # This job runs weekly and bumps a file so the schedule stays alive.
  keepalive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump keepalive file (Sundays only)
        run: |
          if [ "$(date +%u)" = "7" ] && [ "$(date +%H)" = "12" ]; then
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .keepalive
            git diff --cached --quiet || git commit -m "chore: keepalive"
            git push
          fi
